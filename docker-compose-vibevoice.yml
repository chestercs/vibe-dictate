# ============================================================================
#  VibeVoice STT backend for vibe-dictate — x86_64 (NVIDIA consumer GPUs).
#
#  Exposes the OpenAI Audio API (/v1/audio/transcriptions) backed by
#  microsoft/VibeVoice-ASR-HF. Any OpenAI-compat STT client (Open WebUI,
#  LibreChat, vibe-dictate, the OpenAI SDK, ...) can point at it.
#
#  Runtime-install pattern (no docker build):
#    - Base image: nvcr.io/nvidia/pytorch:25.09-py3  (CUDA 12.x, amd64)
#    - First start: scripts/openai_asr_entrypoint.sh pip-installs
#      transformers>=5.3 + the FastAPI stack. Marker file at
#      /root/.vibevoice_openai_installed makes restarts fast.
#
#  Start:
#    cp .env.vibevoice.example .env
#    docker compose -f docker-compose-vibevoice.yml up -d
#    # OpenAI-compat endpoint on http://localhost:8080
#
#  The VibeVoice upstream checkout is NOT required for this stack —
#  transformers 5.3+ carries VibeVoiceAsrForConditionalGeneration natively.
#  For the Gradio demo / realtime TTS / vLLM experiments see the
#  `vibevoice-lab/` folder (split out so it can be lifted into its own
#  project).
# ============================================================================

services:

  vibevoice-asr-openai:
    image: ${VIBEVOICE_BASE_IMAGE:-nvcr.io/nvidia/pytorch:25.09-py3}
    container_name: vibevoice-asr-openai
    restart: unless-stopped
    tty: true
    ipc: host
    entrypoint: ["/bin/bash", "/workspace/vibe-dictate-scripts/openai_asr_entrypoint.sh"]
    command: >
      python /workspace/vibe-dictate-scripts/openai_asr_server.py
      --model ${VIBEVOICE_OPENAI_ASR_MODEL:-microsoft/VibeVoice-ASR-HF}
      --host 0.0.0.0
      --port 8080
      --max-new-tokens ${VIBEVOICE_MAX_NEW_TOKENS:-8192}
    ports:
      - "${VIBEVOICE_OPENAI_ASR_PORT:-8080}:8080"
    volumes:
      - ./scripts:/workspace/vibe-dictate-scripts:ro
      - vibevoiceHFCache:/root/.cache/huggingface
      - vibevoicePipCache:/root/.cache/pip
    environment:
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      TRANSFORMERS_VERBOSITY: error
      PYTHONUNBUFFERED: "1"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      VIBEVOICE_API_KEY: ${VIBEVOICE_OPENAI_ASR_API_KEY:-}
    ulimits:
      memlock: -1
      stack: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

volumes:
  vibevoiceHFCache:
  vibevoicePipCache:
